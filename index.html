<!DOCTYPE html>
<html lang="ru">
<head>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="TodoLogics.css">
    <title>First Todo on Real life</title>
</head>
 
<body>  
        <h1 class="TodoList">TODO LIST</h1>

        <div class="overlay"></div>

    <div class="Todo-container">
        <input class="fieldTodo" id="fieldTodo" placeholder="Note |">
    
            <button class="ButtonALL" onclick="openModal(event)">ALL</button>

        <div class="modal-buttons">
            <div class="button-content">
            <button onclick="filterTasks('all')" class="ButtonsAllTasks">All</button>
            <button onclick="filterTasks('done')" class="ButtonComplete">Complete</button>
            <button onclick="filterTasks('todo')" class="ButtonIncomplete">Incomplete</button>
            </div>
        </div>
       
            <div class="divCounterTaskModal">
                <p class="counterPh">Всего задач: <span class="taskCountSpanAll">0</span></p>
                <p class="counterPh">Активные задачи: <span class="taskCountSpanActive">0</span></p>
                <p class="counterPh">Выполненые, текущие: <span class="taskCountSpanCompleted">0</span></p>
            </div>


        <button class="ButtonNight"></button>

        <label class="switch">
            <input type="checkbox" class="switchInput">
            <span class="slider"></span>
        </label>
      
        
    </div>
            <div class="TodoAll">
            <ul class="Todo-text">
            <li class="Todo-List">
            <span></span>
                </li>
            </ul>
        </div>
        <img class="NoresultsSvg" src="materials/Detective-check-footprint 1.svg" alt="">

        <!-- создать новую туду -->
        <div class="parentTodo">
            <div class="modalWindow"><h1 class="NewNote">NEW NOTE</h1>
                <input class="inputNew"  type="text" placeholder="Input your note...">
                <p class="error-msg">
                     Поле не может быть пустым!
                 </p>
                
            <button type="button" class="closeBtn">CANCEL</button>
            <button type="button" class="saveBtn">APPLY</button>
        </div>
        <button  class="ButtonCreate"></button>
        
        </div> 

        

    <script src="TodoLogics.js">
    </script>
</body>
</html>
